<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRYN</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ================= BACKGROUND ================= */
body{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 45%),
    radial-gradient(circle at 70% 70%, rgba(255,255,255,0.05), transparent 50%),
    linear-gradient(135deg,#0a0a0a,#050505,#0a0a0a);

    position:relative;
}

/* grain subtle luxury */
body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;

    background:
    repeating-radial-gradient(circle,
        rgba(255,255,255,0.03) 0px,
        rgba(0,0,0,0.02) 2px,
        transparent 5px,
        transparent 8px
    );

    opacity:0.2;
}

/* ================= BRAND ================= */
.brand{
    position:absolute;
    top:24px;
    left:24px;

    font-family:Arial, sans-serif;
    letter-spacing:0.45em;
    font-size:14px;

    color:rgba(255,255,255,0.85);

    z-index:10;
}

/* ================= IMAGE ================= */
.image-wrap img{
    width:220px;
    max-width:70vw;

    opacity:0;
    transform:scale(1.06);

    animation:luxuryFlash 3.2s ease-in-out infinite;

    filter:brightness(1.02) contrast(1.08);
}

/* ================= QUICK LUXURY CYCLE ================= */
@keyframes luxuryFlash{

    /* hidden */
    0%{
        opacity:0;
        transform:scale(1.06);
        filter:blur(6px) brightness(0.9);
    }

    /* FAST APPEAR (premium reveal) */
    10%{
        opacity:1;
        transform:scale(1);
        filter:blur(0px) brightness(1.1);
    }

    /* hold short (luxury pause) */
    35%{
        opacity:0.95;
        transform:scale(1);
        filter:blur(0px) brightness(1);
    }

    /* FAST FADE OUT */
    60%{
        opacity:0.2;
        transform:scale(0.98);
        filter:blur(2px) brightness(0.9);
    }

    /* gone */
    100%{
        opacity:0;
        transform:scale(0.96);
        filter:blur(6px) brightness(0.8);
    }
}

/* ================= GLOW ================= */
.glow{
    position:absolute;
    width:70vw;
    height:70vw;
    max-width:800px;
    max-height:800px;

    border-radius:50%;

    background:rgba(255,255,255,0.03);
    filter:blur(140px);

    animation:float 6s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translate(0,0);
    }
    50%{
        transform:translate(25px,-18px);
    }
}
</style>

</head>

<body>

<div class="brand">CRYN</div>

<div class="glow"></div>

<div class="image-wrap">
    <img src="https://j.top4top.io/p_3806i17500.png" alt="CRYN">
</div>

</body>
</html>
