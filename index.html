<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRYN</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ================= BACKGROUND ================= */
body{
    position:relative;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.05), transparent 50%),
    linear-gradient(135deg,#0a0a0a,#050505,#0a0a0a);
}

/* ================= BRAND ================= */
.brand-name{
    position:fixed;
    top:24px;
    left:24px;

    color:#f4efe4;
    text-decoration:none;

    font-family:'Playfair Display', serif;
    font-size:22px;
    letter-spacing:0.32em;

    z-index:1000;

    transition:0.4s ease;
}

.brand-name:hover{
    opacity:0.6;
    transform:translateY(-1px);
}

/* ================= NAV BUTTON ================= */
.nav-btn{
    position:fixed;
    top:24px;
    right:24px;

    width:44px;
    height:44px;

    background:linear-gradient(145deg,#f2eadb,#e3dac9);
    border-radius:12px;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;
    z-index:1000;

    box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.8),
    inset -3px -3px 10px rgba(0,0,0,0.15),
    0 18px 35px rgba(0,0,0,0.55);

    transition:0.35s cubic-bezier(.2,.9,.2,1);
}

/* LUXURY CLICK EFFECT */
.nav-btn:active{
    transform:scale(0.94);
    filter:blur(0.3px);
}

/* ICON */
.nav-icon{
    width:20px;
    height:14px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.nav-icon span{
    height:2px;
    border-radius:999px;
    background:linear-gradient(90deg,#1a1a1a,#000);
}

.nav-icon span:nth-child(2){
    width:14px;
    opacity:0.6;
}

.nav-icon span:nth-child(1),
.nav-icon span:nth-child(3){
    width:20px;
}

/* ================= BACKDROP ================= */
.backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    opacity:0;
    pointer-events:none;
    transition:0.5s ease;
    z-index:1500;
}

.backdrop.active{
    opacity:1;
    pointer-events:auto;
}

/* ================= MENU PANEL ================= */
.menu-panel{
    position:fixed;
    top:70px;
    right:70px;

    width:340px;
    padding:30px 28px;

    border-radius:20px;

    background:
    /* bone ivory base */
    linear-gradient(135deg,
        #f6f0e3,
        #efe6d4,
        #f8f3e7
    ),

    /* aged fossil yellow */
    radial-gradient(circle at 25% 20%,
        rgba(210,180,90,0.22),
        transparent 55%
    ),

    radial-gradient(circle at 75% 70%,
        rgba(30,30,30,0.18),
        transparent 60%
    ),

    /* keropos grain */
    repeating-radial-gradient(circle,
        rgba(0,0,0,0.06) 0px,
        rgba(0,0,0,0.05) 1px,
        transparent 4px,
        transparent 8px
    );

    box-shadow:
    0 30px 80px rgba(0,0,0,0.6),
    inset 1px 1px 0 rgba(255,255,255,0.85),
    inset -2px -2px 12px rgba(0,0,0,0.12);

    transform:translateY(-8px) scale(0.98);
    opacity:0;
    pointer-events:none;

    transition:0.55s cubic-bezier(.2,.9,.2,1);

    z-index:2000;
}

/* ACTIVE STATE */
.menu-panel.active{
    transform:translateY(0) scale(1);
    opacity:1;
    pointer-events:auto;
}

/* ================= MENU TEXT ================= */
.menu-title{
    font-family:'Playfair Display', serif;
    font-size:12px;
    letter-spacing:0.45em;
    opacity:0.55;
    margin-bottom:18px;
}

.menu-panel a{
    display:block;
    text-decoration:none;

    font-family:'Playfair Display', serif;
    font-size:22px;
    letter-spacing:0.28em;

    color:#111;

    margin:16px 0;

    position:relative;

    transition:0.35s cubic-bezier(.2,.9,.2,1);
}

/* underline luxury */
.menu-panel a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-6px;
    width:0%;
    height:1px;
    background:linear-gradient(90deg,#111,transparent);
    transition:0.4s ease;
}

.menu-panel a:hover{
    letter-spacing:0.34em;
    transform:translateX(4px);
}

.menu-panel a:hover::after{
    width:100%;
}

/* ================= BACKGROUND ================= */
.blob{
    position:absolute;
    width:650px;
    height:650px;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    filter:blur(130px);
    top:-180px;
    left:-180px;
}

.blob2{
    position:absolute;
    width:520px;
    height:520px;
    border-radius:50%;
    background:rgba(255,255,255,0.035);
    filter:blur(140px);
    right:-120px;
    bottom:-120px;
}

.center-glow{
    position:absolute;
    width:75vw;
    height:75vw;
    max-width:900px;
    max-height:900px;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:rgba(255,255,255,0.02);
    filter:blur(160px);
}
</style>

</head>

<body>

<a href="./" class="brand-name">CRYN</a>

<div class="nav-btn" onclick="toggleMenu()">
    <div class="nav-icon">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<div class="backdrop" id="backdrop" onclick="toggleMenu()"></div>

<div class="menu-panel" id="menu">
    <div class="menu-title">NAVIGATION</div>

    <a href="#">HOME</a>
    <a href="#">COLLECTION</a>
    <a href="#">ABOUT</a>
    <a href="#">CONTACT</a>
</div>

<div class="blob"></div>
<div class="blob2"></div>
<div class="center-glow"></div>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
    document.getElementById("backdrop").classList.toggle("active");
}
</script>

</body>
</html>
